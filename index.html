<meta charset="UTF-8"/>

<title>WealthLens</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0e17;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#e2e8f0;font-size:14px;display:flex;min-height:100vh}
a{color:inherit;text-decoration:none}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 12px;font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #1e2a3a}
td{padding:11px 12px;font-size:13px;border-bottom:1px solid #1e2a3a}
input,select{width:100%;padding:8px 12px;background:#0d1220;border:1px solid #1e2a3a;border-radius:8px;color:#fff;font-size:13px;outline:none;font-family:inherit}
input[type=range]{accent-color:#3b82f6}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.bc{background:rgba(6,182,212,.15);color:#06b6d4}
.bg2{background:rgba(16,185,129,.15);color:#10b981}
.bo{background:rgba(245,158,11,.15);color:#f59e0b}
.br{background:rgba(239,68,68,.15);color:#ef4444}
.bp{background:rgba(139,92,246,.15);color:#8b5cf6}

/* SIDEBAR */
#sidebar{width:220px;background:#080c14;border-right:1px solid #1e2a3a;padding:20px 0;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:10}
.logo{padding:0 20px 28px;font-size:19px;font-weight:800;color:#fff}
.logo span{color:#3b82f6}
.nav-link{padding:9px 20px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:13px;color:#64748b;border-right:2px solid transparent;transition:.15s}
.nav-link:hover{color:#fff;background:rgba(59,130,246,.08)}
.nav-link.active{color:#fff;font-weight:600;background:rgba(59,130,246,.15);border-right-color:#3b82f6}
.badge-count{margin-left:auto;background:#ef4444;color:#fff;font-size:10px;font-weight:700;border-radius:10px;padding:1px 6px}
#reset-btn{margin:auto 16px 0;padding:8px;background:transparent;border:1px solid #1e2a3a;border-radius:8px;color:#64748b;cursor:pointer;font-size:12px;font-family:inherit}
#reset-btn:hover{color:#fff}

/* MAIN */
#main{flex:1;margin-left:220px;padding:32px 40px;max-width:1100px}
.page{display:none}.page.active{display:block}
h1{font-size:24px;font-weight:800;color:#fff;margin-bottom:4px}
.subtitle{color:#64748b;margin-bottom:24px;font-size:13px}

/* CARDS */
.card{background:#111827;border-radius:12px;padding:18px 22px;border:1px solid #1e2a3a;margin-bottom:14px}
.hero-card{background:linear-gradient(135deg,#111827,#1a1f35)}
.stat-label{font-size:11px;color:#64748b;margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
.stat-value{font-size:20px;font-weight:700;color:#fff}
.big-value{font-size:38px;font-weight:800;color:#fff;letter-spacing:-1px}

/* GRID */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.g21{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:14px}

/* BUTTONS */
.btn{padding:7px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;display:inline-flex;align-items:center;gap:5px}
.btn-blue{background:#3b82f6;color:#fff}
.btn-ghost{background:transparent;color:#64748b;border:1px solid #1e2a3a}
.btn-sm{padding:4px 10px;font-size:11px}

/* COLORS */
.green{color:#10b981}.red{color:#ef4444}.orange{color:#f59e0b}.blue{color:#3b82f6}.muted{color:#64748b}

/* TABLE ROW ACTIONS */
.action{cursor:pointer;font-size:12px;padding:2px 6px;border-radius:4px;border:none;background:transparent;font-family:inherit}
.action.edit{color:#64748b}.action.del{color:#ef4444}
.action:hover{opacity:.7}

/* MODAL */
#modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;justify-content:center;align-items:center}
#modal-bg.open{display:flex}
#modal-box{background:#111827;border-radius:14px;padding:26px;width:420px;max-height:85vh;overflow-y:auto;border:1px solid #1e2a3a}
.modal-title{font-size:17px;font-weight:700;color:#fff;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center}
.modal-close{cursor:pointer;color:#64748b;font-size:20px;line-height:1;background:none;border:none;font-family:inherit}
.field{margin-bottom:12px}
.field label{font-size:12px;font-weight:600;color:#64748b;display:block;margin-bottom:4px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.full-btn{width:100%;margin-top:10px;padding:10px}

/* ALERT CARDS */
.alert-card{border-radius:10px;padding:14px 18px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.alert-reminder{background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.2)}
.alert-deadline{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.2)}
.alert-review{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.2)}

/* ZAKAT TOGGLE */
.tog-group{display:flex;gap:6px}
.tog{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #1e2a3a;background:#0d1220;color:#64748b;font-family:inherit}
.tog.on{background:#3b82f6;color:#fff;border-color:#3b82f6}

/* SIMPLE BAR CHART */
.bar-chart{display:flex;align-items:flex-end;gap:4px;height:120px;padding:0 4px}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{width:100%;border-radius:4px 4px 0 0;min-height:2px}
.bar-label{font-size:10px;color:#64748b}

/* PIE placeholder */
.pie-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.pie-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.pie-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#94a3b8}
</style>
</head>

// ── FORMATTING ────────────────────────────────────────────────────
function fmt(n) {
  if(n == null || isNaN(n)) return "$0";
  return new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",minimumFractionDigits:0,maximumFractionDigits:0}).format(n);
}
function fmtD(n, decimals=2) {
  if(n == null || isNaN(n)) return "$0";
  return new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",minimumFractionDigits:decimals,maximumFractionDigits:decimals}).format(n);
}
function pct(g,c) { return c > 0 ? ((g/c)*100).toFixed(1)+"%" : "0%"; }
function signPct(g,c) { const p = c>0?(g/c)*100:0; return (p>=0?"+":"")+p.toFixed(1)+"%"; }

// ── TOTALS ────────────────────────────────────────────────────────
function totals() {
  const bank = D.bankAccounts.reduce((s,a)=>s+a.balance,0);
  const stock = D.stocks.reduce((s,a)=>s+a.shares*a.currentPrice,0);
  const stockCost = D.stocks.reduce((s,a)=>s+a.shares*a.avgCost,0);
  const crypto = D.crypto.reduce((s,c)=>s+c.currentValue,0);
  const plans = D.stockPlans.reduce((s,p)=>s+p.value,0);
  const retire = D.retirement.reduce((s,r)=>s+r.balance,0);
  const propVal = D.properties.reduce((s,p)=>s+(p.currentValue||0),0);
  const propDebt = D.properties.reduce((s,p)=>s+p.mortgageBalance,0);
  const cc = D.creditCards.reduce((s,c)=>s+c.balance,0);
  const loans = D.loans.reduce((s,l)=>s+l.balance,0);
  const assets = bank+stock+crypto+plans+retire+propVal;
  const liab = propDebt+cc+loans;
  const income = D.cashFlow.income.reduce((s,i)=>s+i.amount,0);
  const expenses = D.cashFlow.expenses.reduce((s,e)=>s+e.amount,0);
  const fidStock = D.stocks.filter(s=>s.account==="Fidelity").reduce((s,a)=>s+a.shares*a.currentPrice,0);
  const rhStock = D.stocks.filter(s=>s.account==="Robinhood").reduce((s,a)=>s+a.shares*a.currentPrice,0);
  return {bank,stock,stockCost,stockGain:stock-stockCost,crypto,plans,retire,propVal,propDebt,propEquity:propVal-propDebt,cc,loans,assets,liab,netWorth:assets-liab,income,expenses,savings:income-expenses,fidStock,rhStock};
}

function computeZakat() {
  const s = D.zakatSettings;
  const GPO = 31.1035;
  const nisabGold = 87.48 * (s.goldPricePerOz||2880) / GPO;
  const nisabSilver = 612.36 * (s.silverPricePerOz||33) / GPO;
  const nisab = s.nisabBasis === "gold" ? nisabGold : nisabSilver;
  let total = 0, deduct = 0, excl = 0;
  const rows = [];
  const cash = D.bankAccounts.reduce((s,a)=>s+a.balance,0);
  total += cash; rows.push({icon:"🏦",cat:"Cash & Banks",inc:cash,excl:0,rule:"Fully zakatable"});
  const stk = D.stocks.reduce((s,a)=>s+a.shares*a.currentPrice,0);
  total += stk; rows.push({icon:"📈",cat:"Stocks & ETFs",inc:stk,excl:0,rule:"Full market value"});
  const cr = D.crypto.reduce((s,c)=>s+c.currentValue,0);
  total += cr; rows.push({icon:"₿",cat:"Crypto",inc:cr,excl:0,rule:"Full value"});
  const retGross = D.retirement.reduce((s,r)=>s+r.balance,0);
  const taxP = (s.retirementTaxPct||30)/100;
  let retZ=0, retExcl=0;
  if(s.retirementMethod==="accessible"){retZ=retGross*(1-taxP);retExcl=retGross*taxP;}else{retExcl=retGross;}
  total+=retZ; excl+=retExcl;
  rows.push({icon:"⏳",cat:"Retirement",inc:retZ,excl:retExcl,rule:s.retirementMethod==="accessible"?"Gross minus "+(taxP*100).toFixed(0)+"% tax/penalty":"Deferred until withdrawal"});
  const spZ = D.stockPlans.filter(p=>!p.vested).reduce((s,p)=>s+0,0);
  const spExcl = D.stockPlans.filter(p=>p.vested===false).reduce((s,p)=>s+p.value,0);
  excl += spExcl;
  rows.push({icon:"🏢",cat:"Stock Plans",inc:spZ,excl:spExcl,rule:"Not yet vested - excluded"});
  const goldVal = (s.goldWeightOz||0) * (s.goldPricePerOz||2880);
  if(goldVal>0) total += goldVal;
  rows.push({icon:"🥇",cat:"Gold",inc:goldVal,excl:0,rule:goldVal>0?"Spot price x weight":"Enter weight in settings"});
  if(s.debtDeduction==="short_term") {
    deduct += D.creditCards.reduce((s,c)=>s+c.balance,0);
    D.loans.forEach(l=>deduct+=(l.monthlyPayment||0)*12);
    D.properties.forEach(p=>{if(p.monthlyMortgage>0)deduct+=p.monthlyMortgage*12;});
  }
  rows.push({icon:"➖",cat:"Debt Deductions",inc:-deduct,excl:0,isDeduct:true,rule:"12-month obligations (Hanafi)"});
  const netZ = Math.max(0,total-deduct);
  return {netZ,gross:total,deduct,excl,nisab,nisabGold,nisabSilver,met:netZ>=nisab,due:netZ>=nisab?netZ*0.025:0,rows};
}

// ── NAV ───────────────────────────────────────────────────────────
const PAGES = [
  {key:"overview",label:"Overview",icon:"▦"},
  {key:"bank",label:"Cash & Loans",icon:"🏦"},

  {key:"retirement",label:"401(k) & RSU",icon:"⏳"},

  {key:"cashflow",label:"Cash Flow",icon:"💵"},
  {key:"zakat",label:"Zakat",icon:"🕌"},
  {key:"alerts",label:"Alerts",icon:"🔔"},
];

function buildNav() {
  const alertCount = D.alerts.filter(a=>a.active).length;
  document.getElementById("nav").innerHTML = PAGES.map(p => `
    <div class="nav-link${currentPage===p.key?" active":""}" onclick="goTo('${p.key}')">
      <span>${p.icon}</span><span>${p.label}</span>
      ${p.key==="alerts"&&alertCount>0?`<span class="badge-count">${alertCount}</span>`:""}
    </div>`).join("");
}

function goTo(page) {
  document.querySelectorAll(".page").forEach(el=>el.classList.remove("active"));
  document.getElementById("page-"+page).classList.add("active");
  currentPage = page;
  buildNav();
  renderPage(page);
}

// ── RENDER ────────────────────────────────────────────────────────
function render() {
  buildNav();
  renderPage(currentPage);
}

function renderPage(page) {
  const el = document.getElementById("page-"+page);
  const T = totals();
  switch(page) {
    case "overview": el.innerHTML = renderOverview(T); break;
    case "bank": el.innerHTML = renderBank(T); break;
    case "stocks": el.innerHTML = renderStocks(T); break;
    case "retirement": el.innerHTML = renderRetirement(); break;
    case "properties": el.innerHTML = renderProperties(T); break;
    case "cashflow": el.innerHTML = renderCashFlow(T); break;
    case "zakat": el.innerHTML = renderZakat(); break;
    case "alerts": el.innerHTML = renderAlerts(); break;
  }
}

        <div class="muted" style="font-size:12px;margin-bottom:6px">Gold Weight (oz)</div>
        <input type="number" step="0.01" value="${s.goldWeightOz||""}" placeholder="0" onchange="zakatSet('goldWeightOz',parseFloat(this.value)||0);renderPage('zakat')" style="width:100%">
      </div>
    </div>
  </div>
  <div class="card">
    <div style="font-weight:700;color:#fff;margin-bottom:4px">Asset Breakdown</div>
    ${rowsHtml}
    <div style="background:#0d1220;border-radius:10px;padding:14px;margin-top:12px;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;text-align:center">
      <div><div class="muted" style="font-size:11px">Gross</div><div style="font-weight:700;color:#fff">${fmt(zr.gross)}</div></div>
      <div><div class="muted" style="font-size:11px">Deductions</div><div style="font-weight:700;color:#ef4444">-${fmt(zr.deduct)}</div></div>
      <div><div class="muted" style="font-size:11px">Net Zakatable</div><div style="font-weight:700;color:#3b82f6">${fmt(zr.netZ)}</div></div>
      <div><div class="muted" style="font-size:11px">Zakat Due</div><div style="font-weight:700;color:#10b981">${fmt(zr.due)}</div></div>
    </div>
  </div>`;
}

function zakatSet(k,v) { D.zakatSettings[k]=v; saveData(); }

// ── ALERTS ────────────────────────────────────────────────────────
function renderAlerts() {
  const active = D.alerts.filter(a=>a.active);
  const cards = active.map(a=>`
    <div class="alert-card alert-${a.type}">
      <div>
        <div style="font-weight:600;color:#fff">${a.text}</div>
        <div class="muted" style="font-size:12px;margin-top:3px">${a.date}</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <span class="badge ${a.type==="deadline"?"br":a.type==="reminder"?"bp":"bo"}">${a.type}</span>
        <button class="btn btn-ghost btn-sm" onclick="doneAlert('${a.id}')">Done</button>
      </div>
    </div>`).join("");
  return `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
    <h1>Alerts & Reminders</h1>
    <button class="btn btn-blue" onclick="addAlertModal()">+ Add Alert</button>
  </div>
  ${cards||'<div class="card"><p class="muted">No active alerts.</p></div>'}`;
}

function doneAlert(id) { const a=D.alerts.find(a=>a.id===id); if(a){a.active=false;saveData();render();} }

// ── MODALS ────────────────────────────────────────────────────────
function openModal(html) {
  document.getElementById("modal-box").innerHTML = html;
  document.getElementById("modal-bg").classList.add("open");
}
function closeModal(e) {
  if(e && e.target !== document.getElementById("modal-bg")) return;
  document.getElementById("modal-bg").classList.remove("open");
}
function closeModalDirect() { document.getElementById("modal-bg").classList.remove("open"); }

function addBankModal() {
  openModal(`<div class="modal-title">Add Bank Account <button class="modal-close" onclick="closeModalDirect()">×</button></div>
    <div class="field"><label>Account Name</label><input id="m-name" placeholder="Chase Checking..."/></div>
    <div class="row2">
      <div class="field"><label>Type</label><select id="m-type"><option value="checking">Checking</option><option value="savings">Savings</option></select></div>
      <div class="field"><label>Institution</label><input id="m-inst" placeholder="Chase"/></div>
    </div>
    <div class="field"><label>Balance</label><input id="m-bal" type="number" step="0.01" placeholder="0.00"/></div>
    <button class="btn btn-blue full-btn" onclick="saveBankAdd()">Add Account</button>`);
}
function saveBankAdd() {
  const name=document.getElementById("m-name").value;
  const bal=parseFloat(document.getElementById("m-bal").value)||0;
  if(!name){alert("Enter a name");return;}
  D.bankAccounts.push({id:uid(),name,type:document.getElementById("m-type").value,balance:bal,institution:document.getElementById("m-inst").value||"Other"});
  saveData();closeModalDirect();render();
}

function editBankModal(id) {
  const a = D.bankAccounts.find(a=>a.id===id);
  openModal(`<div class="modal-title">Edit: ${a.name} <button class="modal-close" onclick="closeModalDirect()">×</button></div>
    <div class="field"><label>Balance</label><input id="m-bal" type="number" step="0.01" value="${a.balance}"/></div>
    <button class="btn btn-blue full-btn" onclick="saveBankEdit('${id}')">Save</button>`);
}
function saveBankEdit(id) {
  const a=D.bankAccounts.find(a=>a.id===id);
  a.balance=parseFloat(document.getElementById("m-bal").value)||0;
  saveData();closeModalDirect();render();
}

function addStockModal() {
  openModal(`<div class="modal-title">Add Position <button class="modal-close" onclick="closeModalDirect()">×</button></div>
    <div class="row2">
      <div class="field"><label>Ticker</label><input id="m-ticker" placeholder="AAPL"/></div>
      <div class="field"><label>Name</label><input id="m-name" placeholder="Apple Inc."/></div>
    </div>
    <div class="row2">
      <div class="field"><label>Shares</label><input id="m-shares" type="number" step="0.001" placeholder="0"/></div>
      <div class="field"><label>Avg Cost</label><input id="m-cost" type="number" step="0.01" placeholder="0.00"/></div>
    </div>
    <div class="row2">
      <div class="field"><label>Current Price</label><input id="m-price" type="number" step="0.01" placeholder="0.00"/></div>
      <div class="field"><label>Account</label><select id="m-acct"><option>Fidelity</option><option>Robinhood</option></select></div>
    </div>
    <button class="btn btn-blue full-btn" onclick="saveStockAdd()">Add Position</button>`);
}
function saveStockAdd() {
  const ticker=document.getElementById("m-ticker").value.toUpperCase();
  if(!ticker){alert("Enter a ticker");return;}
  D.stocks.push({id:uid(),ticker,name:document.getElementById("m-name").value||ticker,shares:parseFloat(document.getElementById("m-shares").value)||0,avgCost:parseFloat(document.getElementById("m-cost").value)||0,currentPrice:parseFloat(document.getElementById("m-price").value)||0,account:document.getElementById("m-acct").value});
  saveData();closeModalDirect();render();
}

function editStockModal(id) {
  const s=D.stocks.find(s=>s.id===id);
  openModal(`<div class="modal-title">Edit ${s.ticker} <button class="modal-close" onclick="closeModalDirect()">×</button></div>
    <div class="row2">
      <div class="field"><label>Shares</label><input id="m-shares" type="number" step="0.001" value="${s.shares}"/></div>
      <div class="field"><label>Current Price</label><input id="m-price" type="number" step="0.01" value="${s.currentPrice}"/></div>
    </div>
    <button class="btn btn-blue full-btn" onclick="saveStockEdit('${id}')">Save</button>`);
}
function saveStockEdit(id) {
  const s=D.stocks.find(s=>s.id===id);
  s.shares=parseFloat(document.getElementById("m-shares").value)||0;
  s.currentPrice=parseFloat(document.getElementById("m-price").value)||0;
  saveData();closeModalDirect();render();
}

function addPropModal() {
  openModal(`<div class="modal-title">Add Property <button class="modal-close" onclick="closeModalDirect()">×</button></div>
    <div class="field"><label>Name</label><input id="m-name" placeholder="My Home"/></div>
    <div class="field"><label>Address</label><input id="m-addr" placeholder="123 Main St"/></div>
    <div class="row2">
      <div class="field"><label>Est. Value</label><input id="m-val" type="number" step="1000" placeholder="0"/></div>
      <div class="field"><label>Mortgage Balance</label><input id="m-mort" type="number" step="1000" placeholder="0"/></div>
    </div>
    <div class="row2">
      <div class="field"><label>Monthly Payment</label><input id="m-pmt" type="number" step="100" placeholder="0"/></div>
      <div class="field"><label>Is Rental?</label><select id="m-rental"><option value="false">No</option><option value="true">Yes</option></select></div>
    </div>
    <button class="btn btn-blue full-btn" onclick="savePropAdd()">Add Property</button>`);
}
function savePropAdd() {
  const name=document.getElementById("m-name").value;
  if(!name){alert("Enter a name");return;}
  D.properties.push({id:uid(),name,address:document.getElementById("m-addr").value,currentValue:parseFloat(document.getElementById("m-val").value)||0,mortgageBalance:parseFloat(document.getElementById("m-mort").value)||0,monthlyMortgage:parseFloat(document.getElementById("m-pmt").value)||0,rate:0,lender:"",loanDuration:"",isRental:document.getElementById("m-rental").value==="true"});
  saveData();closeModalDirect();render();
}

function editPropModal(id) {
  const p=D.properties.find(p=>p.id===id);
  openModal(`<div class="modal-title">Edit Property <button class="modal-close" onclick="closeModalDirect()">×</button></div>
    <div class="row2">
      <div class="field"><label>Est. Value</label><input id="m-val" type="number" value="${p.currentValue}"/></div>
      <div class="field"><label>Mortgage Balance</label><input id="m-mort" type="number" value="${p.mortgageBalance}"/></div>
    </div>
    <button class="btn btn-blue full-btn" onclick="savePropEdit('${id}')">Save</button>`);
}
function savePropEdit(id) {
  const p=D.properties.find(p=>p.id===id);
  p.currentValue=parseFloat(document.getElementById("m-val").value)||0;
  p.mortgageBalance=parseFloat(document.getElementById("m-mort").value)||0;
  saveData();closeModalDirect();render();
}

function addIncomeModal() {
  openModal(`<div class="modal-title">Add Income <button class="modal-close" onclick="closeModalDirect()">×</button></div>
    <div class="field"><label>Name</label><input id="m-name" placeholder="Salary"/></div>
    <div class="field"><label>Monthly Amount</label><input id="m-amt" type="number" step="100" placeholder="0"/></div>
    <button class="btn btn-blue full-btn" onclick="saveCFAdd('income')">Add</button>`);
}
function addExpenseModal() {
  openModal(`<div class="modal-title">Add Expense <button class="modal-close" onclick="closeModalDirect()">×</button></div>
    <div class="field"><label>Name</label><input id="m-name" placeholder="Rent"/></div>
    <div class="row2">
      <div class="field"><label>Monthly Amount</label><input id="m-amt" type="number" step="100" placeholder="0"/></div>
      <div class="field"><label>Category</label><select id="m-cat"><option>housing</option><option>living</option><option>auto</option><option>insurance</option><option>savings</option></select></div>
    </div>
    <button class="btn btn-blue full-btn" onclick="saveCFAdd('expenses')">Add</button>`);
}
function saveCFAdd(type) {
  const name=document.getElementById("m-name").value;
  if(!name)return;
  const item={id:uid(),name,amount:parseFloat(document.getElementById("m-amt").value)||0,frequency:"monthly"};
  if(type==="expenses") item.category=document.getElementById("m-cat").value;
  D.cashFlow[type].push(item);
  saveData();closeModalDirect();render();
}
function deleteCF(type,id) { D.cashFlow[type]=D.cashFlow[type].filter(i=>i.id!==id); saveData(); render(); }

function addAlertModal() {
  openModal(`<div class="modal-title">Add Alert <button class="modal-close" onclick="closeModalDirect()">×</button></div>
    <div class="field"><label>Description</label><input id="m-text" placeholder="Payment due..."/></div>
    <div class="row2">
      <div class="field"><label>Date</label><input id="m-date" type="date"/></div>
      <div class="field"><label>Type</label><select id="m-type"><option value="reminder">Reminder</option><option value="deadline">Deadline</option><option value="review">Review</option></select></div>
    </div>
    <button class="btn btn-blue full-btn" onclick="saveAlertAdd()">Add</button>`);
}
function saveAlertAdd() {
  const text=document.getElementById("m-text").value;
  if(!text)return;
  D.alerts.push({id:uid(),text,date:document.getElementById("m-date").value,type:document.getElementById("m-type").value,active:true});
  saveData();closeModalDirect();render();
}

function deleteItem(key,id) {
  D[key]=D[key].filter(i=>i.id!==id);
  saveData();render();
}

// ── BOOT ──────────────────────────────────────────────────────────
goTo("overview");
</script>
</body>
