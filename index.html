<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0e17;font-family:'DM Sans','Segoe UI',sans-serif;color:#e2e8f0;font-size:14px}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0a0e17}::-webkit-scrollbar-thumb{background:#1e2a3a;border-radius:3px}
input[type=range]{accent-color:#3b82f6;width:100%}
table{width:100%;border-collapse:collapse}
.nav-item{padding:10px 24px;cursor:pointer;display:flex;align-items:center;gap:12px;font-size:14px;border-right:2px solid transparent;transition:all 0.2s;color:#64748b}
.nav-item:hover{color:#fff;background:rgba(59,130,246,0.08)}
.nav-item.active{font-weight:600;color:#fff;background:rgba(59,130,246,0.15);border-right:2px solid #3b82f6}
.btn{padding:8px 18px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px;font-family:inherit}
.btn-primary{background:#3b82f6;color:#fff}
.btn-ghost{background:transparent;color:#64748b;border:1px solid #1e2a3a}
.card{background:#111827;border-radius:12px;padding:20px 24px;border:1px solid #1e2a3a;margin-bottom:16px}
.stat-label{font-size:12px;color:#64748b;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:16px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
th{text-align:left;padding:10px 12px;font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid #1e2a3a}
td{padding:12px;font-size:13px;color:#e2e8f0;border-bottom:1px solid #1e2a3a}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-cyan{background:rgba(6,182,212,0.15);color:#06b6d4}
.badge-green{background:rgba(16,185,129,0.15);color:#10b981}
.badge-orange{background:rgba(245,158,11,0.15);color:#f59e0b}
.badge-red{background:rgba(239,68,68,0.15);color:#ef4444}
.badge-purple{background:rgba(139,92,246,0.15);color:#8b5cf6}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);display:flex;justify-content:center;align-items:center;z-index:100}
.modal-box{background:#111827;border-radius:16px;padding:28px;width:440px;max-height:80vh;overflow-y:auto;border:1px solid #1e2a3a}
.form-field{margin-bottom:12px}
.form-field label{font-size:12px;font-weight:600;color:#64748b;display:block;margin-bottom:4px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
input,select{width:100%;padding:8px 12px;background:#0d1220;border:1px solid #1e2a3a;border-radius:8px;color:#fff;font-size:13px;outline:none;font-family:inherit}
.alert-card{border-radius:10px;padding:14px 18px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.alert-reminder{background:rgba(59,130,246,0.15);border:1px solid rgba(59,130,246,0.2)}
.alert-deadline{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.2)}
.alert-review{background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.2)}
.tog-btn{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.2s}
</style>

      {id:"p2",name:"3-Unit Rental (Talman Ave)",address:"6215 N Talman Ave, Chicago, IL 60659",currentValue:713000,mortgageBalance:506250.00,monthlyMortgage:4295.60,rate:6.124,lender:"Rocket Mortgage",loanDuration:"Jan 2026 - Feb 2056",isRental:true},
      {id:"p3",name:"Daycare (Touhy - Commercial)",address:"Touhy Ave, IL",currentValue:0,mortgageBalance:480694.90,monthlyMortgage:5436.09,rate:0,lender:"Grand Ridge National Bank",loanDuration:"",isRental:false},

      ],

      ],

    alerts:[
      {id:"a1",text:"Rent collection due - Talman Ave",date:"2026-03-01",type:"reminder",active:true},
      {id:"a2",text:"Lexus GX payment due",date:"2026-03-01",type:"deadline",active:true},
      {id:"a3",text:"Review portfolio rebalancing",date:"2026-03-15",type:"review",active:true},
    ],
    zakatSettings:{nisabBasis:"silver",goldPricePerOz:2880,silverPricePerOz:33,stockMethod:"A",retirementMethod:"accessible",retirementTaxPenaltyPct:30,debtDeduction:"short_term",propertyIntents:{},goldWeightOz:0},
  };

  function App(){
    const [page,setPage]=useState("overview");
    const [data,setData]=useState(DD);
    const [modal,setModal]=useState(null);
    const [editItem,setEditItem]=useState(null);

    useEffect(function(){
      try{var s=localStorage.getItem(STORAGE_KEY);if(s)setData(Object.assign({},DD,JSON.parse(s)));}catch(e){}
    },[]);

    function save(d){setData(d);try{localStorage.setItem(STORAGE_KEY,JSON.stringify(d));}catch(e){}}

    var T=useMemo(function(){
      var bank=data.bankAccounts.reduce(function(s,a){return s+a.balance},0);
      var stock=data.stocks.reduce(function(s,a){return s+a.shares*a.currentPrice},0);
      var stockCost=data.stocks.reduce(function(s,a){return s+a.shares*a.avgCost},0);
      var crypto=data.crypto.reduce(function(s,c){return s+c.currentValue},0);
      var plans=data.stockPlans.reduce(function(s,p){return s+p.value},0);
      var retire=data.retirement.reduce(function(s,a){return s+a.balance},0);
      var propVal=data.properties.reduce(function(s,p){return s+(p.currentValue||0)},0);
      var propDebt=data.properties.reduce(function(s,p){return s+p.mortgageBalance},0);
      var cc=data.creditCards.reduce(function(s,c){return s+c.balance},0);
      var loans=data.loans.reduce(function(s,l){return s+l.balance},0);
      var assets=bank+stock+crypto+plans+retire+propVal;
      var liab=propDebt+cc+loans;
      var income=data.cashFlow.income.reduce(function(s,i){return s+i.amount},0);
      var expenses=data.cashFlow.expenses.reduce(function(s,e){return s+e.amount},0);
      var fidStock=data.stocks.filter(function(s){return s.account==="Fidelity"}).reduce(function(s,a){return s+a.shares*a.currentPrice},0);
      var rhStock=data.stocks.filter(function(s){return s.account==="Robinhood"}).reduce(function(s,a){return s+a.shares*a.currentPrice},0);
      return{bank:bank,stock:stock,stockCost:stockCost,stockGain:stock-stockCost,crypto:crypto,plans:plans,retire:retire,propVal:propVal,propDebt:propDebt,propEquity:propVal-propDebt,cc:cc,loans:loans,assets:assets,liab:liab,netWorth:assets-liab,income:income,expenses:expenses,savings:income-expenses,fidStock:fidStock,rhStock:rhStock};
    },[data]);

    function addItem(key,item){
      var d=Object.assign({},data);
      if(key==="income"||key==="expenses"){d.cashFlow=Object.assign({},d.cashFlow);d.cashFlow[key]=d.cashFlow[key].concat([Object.assign({id:uid()},item)]);}
      else{d[key]=d[key].concat([Object.assign({id:uid()},item)]);}
      save(d);setModal(null);
    }
    function updItem(key,id,upd){
      var d=Object.assign({},data);
      if(key==="income"||key==="expenses"){d.cashFlow=Object.assign({},d.cashFlow);d.cashFlow[key]=d.cashFlow[key].map(function(i){return i.id===id?Object.assign({},i,upd):i});}
      else{d[key]=d[key].map(function(i){return i.id===id?Object.assign({},i,upd):i});}
      save(d);setModal(null);setEditItem(null);
    }
    function delItem(key,id){
      var d=Object.assign({},data);
      if(key==="income"||key==="expenses"){d.cashFlow=Object.assign({},d.cashFlow);d.cashFlow[key]=d.cashFlow[key].filter(function(i){return i.id!==id});}
      else{d[key]=d[key].filter(function(i){return i.id!==id});}
      save(d);
    }

    function computeZakat(portfolio,settings){
      var GOLD_G=87.48,SILVER_G=612.36,GPO=31.1035,RATE=0.025;
      var gPx=(settings.goldPricePerOz||2880)/GPO,sPx=(settings.silverPricePerOz||33)/GPO;
      var nisabGold=GOLD_G*gPx,nisabSilver=SILVER_G*sPx;
      var nisab=settings.nisabBasis==="gold"?nisabGold:nisabSilver;
      var totalZ=0,totalExcl=0,deductions=0;var breakdown=[];
      var cashAmt=portfolio.bankAccounts.reduce(function(s,a){return s+a.balance},0);
      totalZ+=cashAmt;breakdown.push({cat:"Cash & Bank Accounts",icon:"🏦",inc:cashAmt,excl:0,rule:"Fully zakatable"});
      var stAmt=portfolio.stocks.reduce(function(s,st){return s+st.shares*st.currentPrice},0);
      totalZ+=stAmt;breakdown.push({cat:"Stocks & ETFs",icon:"📈",inc:stAmt,excl:0,rule:"Full market value (Method A)"});
      var crAmt=portfolio.crypto.reduce(function(s,c){return s+c.currentValue},0);
      totalZ+=crAmt;breakdown.push({cat:"Cryptocurrency",icon:"₿",inc:crAmt,excl:0,rule:"Full value zakatable"});
      var retGross=portfolio.retirement.reduce(function(s,r){return s+r.balance},0);
      var taxP=(settings.retirementTaxPenaltyPct||30)/100;
      var retZ=0,retExcl=0;
      if(settings.retirementMethod==="accessible"){retZ=retGross*(1-taxP);retExcl=retGross*taxP;}else{retExcl=retGross;}
      totalZ+=retZ;totalExcl+=retExcl;
      breakdown.push({cat:"Retirement (401k)",icon:"⏳",inc:retZ,excl:retExcl,rule:settings.retirementMethod==="accessible"?"Accessible: gross minus "+(taxP*100).toFixed(0)+"% tax/penalty":"Deferred until withdrawal"});
      var spV=portfolio.stockPlans.filter(function(p){return p.vested!==false}).reduce(function(s,p){return s+p.value},0);
      var spExcl=portfolio.stockPlans.filter(function(p){return p.vested===false}).reduce(function(s,p){return s+p.value},0);
      totalZ+=spV;totalExcl+=spExcl;
      breakdown.push({cat:"Stock Plans (RSU/ESPP)",icon:"🏢",inc:spV,excl:spExcl,rule:"Only vested equity zakatable"});
      var goldOz=settings.goldWeightOz||0,goldVal=goldOz*(settings.goldPricePerOz||2880);
      if(goldOz>0)totalZ+=goldVal;
      breakdown.push({cat:"Gold Holdings",icon:"🥇",inc:goldVal,excl:0,rule:goldOz>0?"Spot price x weight":"Enter gold weight in settings"});
      var propZ=0,propExcl=0;
      portfolio.properties.forEach(function(p){var intent=(settings.propertyIntents||{})[p.id]||(p.isRental?"rental":"primary");if(intent==="resale"){propZ+=(p.currentValue||0);}else{propExcl+=(p.currentValue||0);}});
      totalZ+=propZ;totalExcl+=propExcl;
      breakdown.push({cat:"Real Estate",icon:"🏠",inc:propZ,excl:propExcl,rule:"Only resale properties zakatable"});
      var ccD=portfolio.creditCards.reduce(function(s,c){return s+c.balance},0);
      if(settings.debtDeduction==="short_term"){
        deductions+=ccD;
        portfolio.loans.forEach(function(l){deductions+=(l.monthlyPayment||0)*12;});
        portfolio.properties.forEach(function(p){if(p.monthlyMortgage>0)deductions+=p.monthlyMortgage*12;});
      }
      breakdown.push({cat:"Debt Deductions",icon:"➖",inc:-deductions,excl:0,isDeduct:true,rule:settings.debtDeduction==="short_term"?"12-month debts deducted (Hanafi)":"No deductions"});
      var netZ=Math.max(0,totalZ-deductions);
      return{netZ:netZ,grossZ:totalZ,deductions:deductions,totalExcl:totalExcl,nisab:nisab,nisabGold:nisabGold,nisabSilver:nisabSilver,met:netZ>=nisab,due:netZ>=nisab?netZ*RATE:0,breakdown:breakdown};
    }

    function Modal(props){
      return h("div",{className:"modal-overlay",onClick:props.onClose},
        h("div",{className:"modal-box",onClick:function(e){e.stopPropagation()}},
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}},
            h("div",{style:{fontSize:18,fontWeight:700,color:"#fff"}},props.title),
            h("span",{style:{cursor:"pointer",fontSize:24,color:C.muted},onClick:props.onClose},"x")
          ),
